name: "Integration Test"
description: "Runs all the integration tests"
runs:
  using: "composite"
  steps:
    - name: Integration Tests
      env:
        MAVEN_OPTS: "-Xmx8g"
        MAVEN_CONFIG: ~/.m2/repository
        JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70.0"
      shell: bash
      run: |
        mvn -B -e verify -f qa/pom.xml -P tomcat,engine-integration-jakarta,h2